server.port=7072

# =========================================================
# DATASOURCE
# =========================================================

spring.datasource.url=jdbc:mysql://localhost:3306/boatraderdevdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=vignesh
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# HIKARI CONNECTION POOL
# =========================================================

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=UserServiceHikariPool

# =========================================================
# JPA / HIBERNATE
# =========================================================

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Enable these temporarily for SQL debugging
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =========================================================
# JACKSON
# =========================================================

spring.jackson.serialization.fail-on-empty-beans=false

# =========================================================
# SPRING APPLICATION
# =========================================================

spring.main.allow-circular-references=true

# =========================================================
# SPRING GRAPHQL
# =========================================================

spring.graphql.http.path=/graphql
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql

# GraphQL schema location
spring.graphql.schema.locations=classpath:graphql/**
spring.graphql.schema.file-extensions=.graphqls,.gqls

# Helpful during development
spring.graphql.schema.printer.enabled=true

# =========================================================
# ACTUATOR
# =========================================================

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.access=unrestricted
management.endpoint.prometheus.access=unrestricted

management.prometheus.metrics.export.enabled=true

# =========================================================
# SPRINGDOC / SWAGGER
# These properties work only when the springdoc dependency
# is present in pom.xml.
# =========================================================

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Sort operations and tags
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha